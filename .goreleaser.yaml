version: 2

project_name: MediaWarp

# 1. 删除了错误的 includes: - ./ 

git:
  ignore_tags:
    - pre-release

snapshot:
  version_template: "PreRelease-v{{ incpatch .Version }}-{{ .ShortCommit }}"

release:
  name_template: "{{ .Tag }}"
  extra_files:
    - glob: ./LICENSE
    # 注意：如果你的代码库中没有 config/config.yaml.example 这个文件，请务必删掉下面这两行，否则必然打包失败！
    - glob: ./config/config.yaml.example
      name_template: config.yaml

before:
  hooks:
    - go mod download

builds:
  - skip: false
    env:
      - GOPROXY=https://goproxy.io,direct
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarm: 7
    binary: "{{ .ProjectName }}"
    ldflags:
      - -s -w
      - -X github.com/wenzhanquan/Wzq-MediaWarp/internal/config.appVersion={{ .Version }}
      - -X github.com/wenzhanquan/Wzq-MediaWarp/internal/config.commitHash={{ .FullCommit }}
      - -X github.com/wenzhanquan/Wzq-MediaWarp/internal/config.buildDate={{ .Date }}

# 2. 将 dockers_v2 修改为了 dockers (v2 强制要求)
dockers:
  # AMD64 镜像
  - image_templates:
      - "wenzhanquan/mediawarp:{{ .Version }}-amd64"
    dockerfile: docker/Dockerfile.goreleaser
    goos: linux
    goarch: amd64

  # ARM64 镜像
  - image_templates:
      - "wenzhanquan/mediawarp:{{ .Version }}-arm64"
    dockerfile: docker/Dockerfile.goreleaser
    goos: linux
    goarch: arm64

  # ARMv7 镜像
  - image_templates:
      - "wenzhanquan/mediawarp:{{ .Version }}-armv7"
    dockerfile: docker/Dockerfile.goreleaser
    goos: linux
    goarch: arm
    goarm: 7

docker_manifests:
  # 正式发布时，自动将上面三个架构的镜像合并为一个带版本号的 Tag
  - name_template: "wenzhanquan/mediawarp:{{ .Version }}"
    image_templates:
      - "wenzhanquan/mediawarp:{{ .Version }}-amd64"
      - "wenzhanquan/mediawarp:{{ .Version }}-arm64"
      - "wenzhanquan/mediawarp:{{ .Version }}-armv7"
  # 正式发布时，自动合并为 latest
  - name_template: "wenzhanquan/mediawarp:latest"
    image_templates:
      - "wenzhanquan/mediawarp:{{ .Version }}-amd64"
      - "wenzhanquan/mediawarp:{{ .Version }}-arm64"
      - "wenzhanquan/mediawarp:{{ .Version }}-armv7"
archives:
  # 3. 将 formats: [tar.gz] 修正为 format: tar.gz
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{- .Os }}_{{ .Arch }}{{- if .Arm}}v{{ .Arm }}{{- end}}"
    format_overrides:
      - goos: windows
        format: zip  # 将 formats: [zip] 修正为 format: zip
    files:
      - src: LICENSE
      - src: README.md
      # 注意：如果找不到这个文件，打包同样会崩溃，没有的话请删掉下面两行
      - src: config/config.yaml.example
        dst: config.yaml.example

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^build:"
      - "^ci:"
      - "^release:"
      - "^issue:"
      - "^MediaWarp"
