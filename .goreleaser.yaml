version: 2

project_name: MediaWarp

# 1. 删除了错误的 includes: - ./ 

git:
  ignore_tags:
    - pre-release

snapshot:
  version_template: "PreRelease-v{{ incpatch .Version }}-{{ .ShortCommit }}"

release:
  name_template: "{{ .Tag }}"
  extra_files:
    - glob: ./LICENSE
    # 注意：如果你的代码库中没有 config/config.yaml.example 这个文件，请务必删掉下面这两行，否则必然打包失败！
    - glob: ./config/config.yaml.example
      name_template: config.yaml

before:
  hooks:
    - go mod download

builds:
  - skip: false
    env:
      - GOPROXY=https://goproxy.io,direct
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarm: 7
    binary: "{{ .ProjectName }}"
    ldflags:
      - -s -w
      - -X github.com/wenzhanquan/Wzq-MediaWarp/internal/config.appVersion={{ .Version }}
      - -X github.com/wenzhanquan/Wzq-MediaWarp/internal/config.commitHash={{ .FullCommit }}
      - -X github.com/wenzhanquan/Wzq-MediaWarp/internal/config.buildDate={{ .Date }}

# 2. 将 dockers_v2 修改为了 dockers (v2 强制要求)
dockers:
  - dockerfile: docker/Dockerfile
    build_args:
      APP_VERSION: "{{ .Version }}"
      COMMIT_HASH: "{{ .FullCommit }}"
      BUILD_DATE: "{{ .Date }}"
    extra_files:
      - go.mod
      - go.sum
      - main.go
      - constants
      - internal
      - static
      - utils
    images:
      - wenzhanquan/mediawarp
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
      - linux/riscv64

archives:
  # 3. 将 formats: [tar.gz] 修正为 format: tar.gz
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{- .Os }}_{{ .Arch }}{{- if .Arm}}v{{ .Arm }}{{- end}}"
    format_overrides:
      - goos: windows
        format: zip  # 将 formats: [zip] 修正为 format: zip
    files:
      - src: LICENSE
      - src: README.md
      # 注意：如果找不到这个文件，打包同样会崩溃，没有的话请删掉下面两行
      - src: config/config.yaml.example
        dst: config.yaml.example

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^build:"
      - "^ci:"
      - "^release:"
      - "^issue:"
      - "^MediaWarp"
