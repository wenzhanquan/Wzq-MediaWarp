name: MediaWarp Build and Release
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".goreleaser.yaml"

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
      PRE_RELEASE_TAG: pre-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          registry: docker.io
          logout: true

      - name: Run GoReleaser (tag release)
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (pre-release for branch push)
        if: ${{ env.IS_RELEASE != 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare pre-release metadata
        if: ${{ env.IS_RELEASE != 'true' }}
        id: prerelease_meta
        run: |
          test -f dist/metadata.json
          version="$(jq -r '.version' dist/metadata.json)"
          commit="$(jq -r '.commit' dist/metadata.json)"
          date="$(jq -r '.date' dist/metadata.json)"
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "dist/metadata.json missing .version" >&2
            exit 1
          fi
          if [ -z "$commit" ] || [ "$commit" = "null" ]; then
            echo "dist/metadata.json missing .commit" >&2
            exit 1
          fi
          if [ -z "$date" ] || [ "$date" = "null" ]; then
            echo "dist/metadata.json missing .date" >&2
            exit 1
          fi
          short_commit="${commit::7}"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "commit=$commit" >> $GITHUB_OUTPUT
          echo "short_commit=$short_commit" >> $GITHUB_OUTPUT
          echo "date=$date" >> $GITHUB_OUTPUT

      - name: Push Docker images from GoReleaser artifacts
        if: ${{ env.IS_RELEASE != 'true' }}
        run: |
          test -f dist/artifacts.json
          mapfile -t image_refs < <(jq -r '.[] | select(.type=="Docker Image") | .name' dist/artifacts.json)
          if [ "${#image_refs[@]}" -eq 0 ]; then
            echo "No Docker images found in dist/artifacts.json" >&2
            exit 1
          fi
          for ref in "${image_refs[@]}"; do
            docker image inspect "$ref" >/dev/null 2>&1 || {
              echo "Local docker image not found: $ref" >&2
              exit 1
            }
            docker push "$ref"
          done
          docker buildx imagetools create \
            -t "wenzhanquan/mediawarp:${{ steps.prerelease_meta.outputs.version }}" \
            "${image_refs[@]}"
          docker buildx imagetools create \
            -t "wenzhanquan/mediawarp:latest" \
            "${image_refs[@]}"

      # ✨ 彻底解决：普通的提交不再去强行覆盖 Git Tag，而是将产物直接上传到 Actions 构件管理
      - name: Upload Snapshot Artifacts to Actions Run
        if: ${{ env.IS_RELEASE != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: MediaWarp-Snapshot-${{ steps.prerelease_meta.outputs.short_commit }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*checksums*.txt
            LICENSE
